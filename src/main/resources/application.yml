server:
  port: 8080

spring:
  datasource:
    # Для локального запуска с docker postgres портом 5433:5432
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:tour_booking}
    username: ${DB_USERNAME:tour_user}
    password: ${DB_PASSWORD:SecurePass123!}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: TourBookingHikariCP
      maximum-pool-size: 10
      minimum-idle: 3
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  freemarker:
    template-loader-path: classpath:/templates/
    suffix: .ftlh

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cache:
    type: redis
    redis:
      time-to-live: 3600000

app:
  currency:
    api-url: ${CURRENCY_API_URL:https://www.cbr-xml-daily.ru/daily_json.js}
  cache:
    prefix: tb:v4

logging:
  level:
    com.project: DEBUG
